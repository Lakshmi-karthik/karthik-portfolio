<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/css/bootstrap.min.css" integrity="sha384-TX8t27EcRE3e/ihU7zmQxVncDAy5uIKz4rEkgIXeMed4M0jlfIDPvg6uqKI2xXr2" crossorigin="anonymous">
    <style>
        .navbar {
            background-color: black;
            height: 80px;
            font-family: inherit;
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        
        .logo {
            height: 50px;
            margin-right: 0.5rem;
            border-radius: 100%;
        }
        
        .name {
            font-size: 1.2rem;
            font-weight: bold;
            font-family: 'Arial', sans-serif;
            color: white !important;
        }
        
        .navbar-nav .nav-link {
            font-weight: bold;
            font-size: 1.2rem;
            color: white !important;
            margin-right: 40px;
        }
        
        .navbar-toggler-icon {
            background-image: url("data:image/svg+xml;charset=utf8,%3Csvg viewBox='0 0 30 30' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath stroke='rgba(255, 255, 255, 1)' stroke-width='2' stroke-linecap='round' stroke-miterlimit='10' d='M4 7h22M4 15h22M4 23h22'/%3E%3C/svg%3E") !important;
            /* The path stroke is set to white to change the color of the bars */
            height: 30px;
        }
        
        @media (max-width: 992px) {
            .navbar {
                width: auto;
                height: auto;
            }
            
            .navbar-nav .nav-link {
                margin-right: 20px;
            }
        
            .name {
                font-size: 1rem;
            }
        
            .logo {
                height: 40px;
            }
        }
        
        @media (max-width: 768px) {
            .navbar {
                width: auto;
                height: auto;
            }
        
            .navbar-nav .nav-link {
                font-size: 1rem;
                margin-right: 10px;
            }
        
            .name {
                font-size: 0.9rem;
            }
        
            .logo {
                height: 35px;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light sticky-top">
        <div class="container-fluid">
          <a class="navbar-brand d-flex align-items-center" href="#">
            <img src="/karthik2.jpeg" alt="Logo" class="logo">
            <span class="name">LAKSHMI KARTHIK</span>
          </a>
          <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation" id="navbarToggle">
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ml-auto">
              <li class="nav-item">
                <a class="nav-link" href="#home">Home</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="#about">About</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="#projects">Projects</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="#contact">Contact</a>
              </li>
            </ul>
          </div>
        </div>
      </nav>
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.5.3/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
    
    <script>
        $(document).ready(function () {
            // Close the navbar when a link is clicked in responsive mode
            $('.nav-link').on('click', function () {
                if ($('.navbar-collapse').hasClass('show')) {
                    $('#navbarToggle').click();
                }
            });
    
            // Close the navbar when clicking outside of it in responsive mode
            $(document).click(function (event) {
                var clickover = $(event.target);
                var navbarOpen = $('.navbar-collapse').hasClass('show');
                if (navbarOpen === true && !clickover.closest('.navbar').length) {
                    $('#navbarToggle').click();
                }
            });
        });
    </script>
    
</body>
</html>
