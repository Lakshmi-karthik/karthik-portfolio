<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/css/bootstrap.min.css" integrity="sha384-TX8t27EcRE3e/ihU7zmQxVncDAy5uIKz4rEkgIXeMed4M0jlfIDPvg6uqKI2xXr2" crossorigin="anonymous">
    <style>
        .footer-container {
  background-color: black;
  color: #fff;
  padding: 2rem;
  text-align: center;
  position: relative;
  font-family: inherit;
}

.footer-content {
  display: flex;
  justify-content: space-around;
  flex-wrap: wrap;
}

.footer-left,
.footer-right {
  flex: 1;
  margin: 1rem;
  gap: 90px;
}

.footer-left h2,
.footer-center h2,
.footer-links h2 {
  font-size: 1.5rem;
  margin-bottom: 1rem;
}

.footer-left p {
  font-size: 1rem;
  white-space: pre-wrap;
  color: white;
  text-align: justify;
}

.footer-right {
  display: flex;
}

.footer-center,
.footer-links {
  margin: 1rem;
  text-align: left;
}

.footer-center .social-media {
  display: flex;
  justify-content: center;
  gap: 1rem;
}

.footer-center .social-media a img {
  width: 40px;
  height: 40px;
  transition: transform 0.3s;
}

.footer-center .social-media a img:hover {
  transform: scale(1.1);
}

.footer-links ul {
  list-style: none;
  padding: 0;
}

.footer-links ul li {
  margin: 0.5rem 0;
}

.footer-links ul li a {
  color: white;
  text-decoration: none;
  transition: color 0.3s;
}

.footer-links ul li a:hover {
  color: blue;
}

.footer-bottom {
  margin-top: 2rem;
}

.footer-bottom .underline {
  width: 80%;
  height: 2px;
  background-color: #222;
  margin: 0.5rem auto;
  border-radius: 5px;
}

.footer-bottom p {
  margin-top: 1rem;
  font-size: 0.9rem;
  color: #bbb;
}

/* Media Queries */
@media (max-width: 768px) {
  .footer-content {
    flex-direction: column;
    align-items: center;
  }

  .footer-right{
    display: flex;
    flex-direction: row;
    align-items: baseline;
  }

  .footer-center,
  .footer-links {
    text-align: center;
  }

  .footer-center,
  .footer-links {
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .footer-center .social-media {
    justify-content: center;
  }

  .footer-center .social-media,
  .footer-links ul {
    display: flex;
    flex-direction: column;
    align-items: center;
  }
}

@media (max-width: 480px) {

  .footer-right{
    display: flex;
    flex-direction: row;
    align-items: baseline;
  }
  
  .footer-left h2,
  .footer-center h2,
  .footer-links h2 {
    font-size: 1.2rem;
  }

  .footer-left p {
    font-size: 0.9rem;
  }

  .footer-center .social-media a img {
    width: 30px;
    height: 30px;
  }

  .footer-links ul li a {
    font-size: 0.9rem;
  }
  
}

    </style>
</head>
<body>
    <footer class="footer-container">
  <div class="footer-content">
    <div class="footer-left text-left">
      <h2>Lakshmi Karthik</h2>
      <p>A Frontend focused Web Developer building the Frontend of Websites and Web Applications that leads to the success of the overall product.</p>
    </div>
    <div class="footer-right">
      <div class="footer-center">
        <h2>Social</h2>
        <div class="social-media">
          <a href="#"><img src="https://upload.wikimedia.org/wikipedia/commons/thumb/e/e7/Instagram_logo_2016.svg/2048px-Instagram_logo_2016.svg.png" alt="Insta"></a>
          <a href="#"><img src="https://cdn-icons-png.flaticon.com/128/3938/3938028.png" alt="Twitter"></a>
          <a href="#"><img src="https://cdn1.iconfinder.com/data/icons/logotypes/32/circle-linkedin-512.png" alt="LinkedIn"></a>
        </div>
      </div>
      <div class="footer-links">
        <h2>Links</h2>
        <ul>
          <li><a href="/about">About</a></li>
          <li><a href="/projects">Projects</a></li>
          <li><a href="/contact">Contact</a></li>
        </ul>
      </div>
    </div>
  </div>
  <div class="footer-bottom">
    <div class="underline"></div>
    <p>© Copyright 2024. Made by Lakshmi Karthik</p>
  </div>
</footer>

</body>
</html>
